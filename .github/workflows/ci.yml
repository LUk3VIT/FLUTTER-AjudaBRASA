name: Flutter Web Fast CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #
  #analyze:
  #  runs-on: ubuntu-latest
  #  steps:
  #    - uses: actions/checkout@v4
  #    
  #    - uses: subosito/flutter-action@v2
  #      with:
  #        channel: 'stable'
  #        cache: true
  #        
  #    - run: flutter pub get
  #      working-directory: flutter_application_1
  #
  #    - run: flutter analyze
  #      working-directory: flutter_application_1
       
  build-and-push-docker:
  #  needs: [analyze] 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: cd flutter_application_1 && flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --verbose
        working-directory: flutter_application_1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./flutter_application_1
          file: ./flutter_application_1/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flutter-ajudabrasa:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flutter-ajudabrasa:${{ github.sha }}
        