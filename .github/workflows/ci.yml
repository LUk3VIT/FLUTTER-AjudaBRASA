name: Flutter Web Fast CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --concurrency=4

  build-and-push-docker:
    needs: [analyze, test] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: cd flutter_application_1 && flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./flutter_application_1
          file: ./flutter_application_1/Dockerfile
          push: true
          # Substitua 'seu-usuario-docker' pelo seu nome de usuário real ou use a variável
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flutter-ajudabrasa:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flutter-ajudabrasa:${{ github.sha }}
